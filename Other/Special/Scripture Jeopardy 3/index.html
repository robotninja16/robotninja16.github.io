<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script type="text/javascript" src="questions.js"></script>
    <script type="text/javascript" src="main.js"></script>
    <title>This is Scripture Jeopardy!</title>
</head>
<body>
    <h2>Scripture Jeopardy!</h2>
    <div id="daily-double-info" class="hidden no-display">
        <h3>Daily double!</h3>
        <button id="exit-daily-double">Continue</button>
    </div>
    <div id="jeopardy-main-table">
        <div>
            <span>Do you see what I see?</span><span>Fancy footwear</span><span>You're fired!</span><span>Look, ma, just hands!</span><span>Did you mean: <i>nag a ram</i></span><span>That's heavy bro!</span>
        </div>
        <div>
            <span>$200</span><span>$200</span><span>$200</span><span>$200</span><span>$200</span><span>$200</span>
        </div>
        <div>
            <span>$400</span><span>$400</span><span>$400</span><span>$400</span><span>$400</span><span>$400</span>
        </div>
        <div>
            <span>$600</span><span>$600</span><span>$600</span><span>$600</span><span>$600</span><span>$600</span>
        </div>
        <div>
            <span>$800</span><span>$800</span><span>$800</span><span>$800</span><span>$800</span><span>$800</span>
        </div>
        <div>
            <span>$1000</span><span>$1000</span><span>$1000</span><span>$1000</span><span>$1000</span><span>$1000</span>
        </div>
        <div>
            <span id="final-jeopardy-button" onclick="showQuestion('final')">Final Jeopardy</span>
        </div>
    </div>
    <div id="questions" class="hidden no-display">
        <div id="price"></div>
        <div id="question"></div>
        <div id="media"></div>
        <div id="answer"></div>
        <div id="buttons"><button onclick="exitQuestion()">Exit question</button><button id="show-answer">Show answer</button></div>
    </div>
    <div id="teams-money-section">
        <div id="left-team-money-section">
            <div><button onclick="changeMoney('left-team-money-section',100)">+</button><button onclick="changeMoney('left-team-money-section',-100)">-</button></div>
            <div><span>$</span><input type="number" value="0" step="100"></div>
        </div>
        <div id="right-team-money-section">
            <div><button onclick="changeMoney('right-team-money-section',100)">+</button><button onclick="changeMoney('right-team-money-section',-100)">-</button></div>
            <div><span>$</span><input type="number" value="0" step="100"></div>
        </div>
    </div>
</body>
</html>
